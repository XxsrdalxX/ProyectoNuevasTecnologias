<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Consolas</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="nav-container">
            <div class="logo"><a href="index.html">GameReview</a></div>
            <ul class="nav-menu">
                <li><a href="#pc">PC</a></li>
                <li><a href="#ps4">PS4</a></li>
                <li><a href="#ps5">PS5</a></li>
            </ul>
        </div>
    </header>

    <main>
        <!-- PC SECTION -->
        <section id="pc">
            <h2>PC</h2>
            <div class="games-grid">
                <div class="game-card">
                    <img src="img/witcher.jpg" alt="PC Game" />
                    <div class="rating">9.2</div>
                </div>
                <div class="game-card">
                    <img src="img/baldurs.jpg" alt="PC Game" />
                    <div class="rating">8.7</div>
                </div>
                <div class="game-card">
                    <img src="img/cyberpunk.jpg" alt="PC Game" />
                    <div class="rating">9.0</div>
                </div>
            </div>
        </section>

        <!-- PS4 SECTION -->
        <section id="ps4">
            <h2>PS4</h2>
            <div class="games-grid">
                <div class="game-card">
                    <img src="img/Eldenring.jpg" alt="PS4 Game" />
                    <div class="rating">9.5</div>
                </div>
                <div class="game-card">
                    <img src="img/helldivers.jpg" alt="PS4 Game" />
                    <div class="rating">8.9</div>
                </div>
                <div class="game-card">
                    <img src="img/Juego.jpg" alt="PS4 Game" />
                    <div class="rating">9.1</div>
                </div>
            </div>
        </section>

        <!-- PS5 SECTION -->
        <section id="ps5">
            <h2>PS5</h2>
            <div class="games-grid">
                <div class="game-card">
                    <img src="img/ff16.jpg" alt="PS5 Game" />
                    <div class="rating">9.8</div>
                </div>
                <div class="game-card">
                    <img src="img/GOFR.png" alt="PS5 Game" />
                    <div class="rating">9.4</div>
                </div>
                <div class="game-card">
                    <img src="img/rdr.jpg" alt="PS5 Game" />
                    <div class="rating">9.6</div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-brand">
                <h3>GameReview</h3>
                <p>Tu portal gamer definitivo.</p>
            </div>
            <div class="footer-links">
                <ul>
                    <li>Sobre nosotros</li>
                    <li>Contacto</li>
                    <li>Términos</li>
                </ul>
            </div>
        </div>
    </footer>
</body>
</html>
